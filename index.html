            return false;
          }
          if (e.ctrlKey && e.shiftKey && (isKeyI || isKeyJ || isKeyC)) {
            e.preventDefault();
            return false;
          }

          // Cmd+Opt+U / Ctrl+U (View Source)

            return false;
